name: Daily build

on:
  schedule:
    - cron: '23 17 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Collect
        run: |
          PYTHONPATH=src python -m streamer_media_bot run

      - name: Seed demo data when DB is empty
        run: |
          python - <<'PY'
          import sqlite3
          conn = sqlite3.connect('data/streamer_media.db')
          cur = conn.execute('select count(*) from items')
          count = cur.fetchone()[0]
          conn.close()
          raise SystemExit(0 if count == 0 else 1)
          PY
        continue-on-error: true
        id: dbcheck

      - name: Add demo items for first publish
        if: steps.dbcheck.outcome == 'success'
        run: |
          PYTHONPATH=src python -m streamer_media_bot seed-demo

      - name: Build site
        run: |
          PYTHONPATH=src python -m streamer_media_bot build

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs data/streamer_media.db
          git diff --cached --quiet || git commit -m "chore: update generated site"
          git push
